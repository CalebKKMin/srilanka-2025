<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2025 스리랑카 단기선교</title>
<style>
  :root {
    --primary: #1a56a0;
    --primary-light: #2e7dd1;
    --accent: #f59e0b;
    --bg: #f0f4f8;
    --card-bg: #ffffff;
    --text: #1e293b;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --tag-bg: #e0f2fe;
    --tag-text: #0369a1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #1a3a6e 0%, #1a56a0 60%, #2e7dd1 100%);
    color: white;
    padding: 20px 16px 24px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.18);
  }
  header .flag { font-size: 2rem; margin-bottom: 4px; }
  header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.5px; }
  header p { font-size: 0.8rem; opacity: 0.85; margin-top: 4px; }
  .stats-bar {
    display: flex; justify-content: center; gap: 20px; margin-top: 12px;
    font-size: 0.78rem; opacity: 0.9;
  }
  .stats-bar span b { font-size: 1rem; }

  .controls {
    max-width: 900px; margin: 16px auto 0; padding: 0 12px;
  }
  .search-box {
    position: relative; margin-bottom: 10px;
  }
  .search-box input {
    width: 100%; padding: 11px 16px 11px 42px;
    border: 2px solid var(--border); border-radius: 10px;
    font-size: 0.95rem; background: white; color: var(--text);
    outline: none; transition: border 0.2s;
    font-family: inherit;
  }
  .search-box input:focus { border-color: var(--primary-light); }
  .search-box .icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); font-size: 1rem;
  }

  .filter-row {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px;
  }
  .filter-group { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
  .filter-label { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; white-space: nowrap; }
  .filter-btn {
    padding: 5px 12px; border: 1.5px solid var(--border); border-radius: 20px;
    background: white; color: var(--text); font-size: 0.78rem; cursor: pointer;
    transition: all 0.15s; font-family: inherit; white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--primary-light); color: var(--primary); }
  .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

  .result-info {
    max-width: 900px; margin: 10px auto 6px; padding: 0 12px;
    font-size: 0.8rem; color: var(--text-muted);
  }

  .grid {
    max-width: 900px; margin: 0 auto; padding: 0 12px 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--card-bg); border-radius: 12px;
    border: 1.5px solid var(--border);
    padding: 14px 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    cursor: pointer; transition: all 0.15s;
  }
  .card:hover { border-color: var(--primary-light); box-shadow: 0 4px 16px rgba(26,86,160,0.12); transform: translateY(-1px); }

  .card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .avatar {
    width: 42px; height: 42px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; font-weight: 700; color: white; flex-shrink: 0;
    overflow: hidden; background: #94a3b8;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .card-name { font-size: 1.05rem; font-weight: 700; }
  .card-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 1px; }

  .card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 3px 9px; border-radius: 20px;
    font-size: 0.72rem; font-weight: 600;
  }
  .tag-team { background: #ede9fe; color: #6d28d9; }
  .tag-group { background: #dcfce7; color: #166534; }
  .tag-ab-a { background: #fef3c7; color: #92400e; }
  .tag-ab-b { background: #dbeafe; color: #1e40af; }
  .tag-bus { background: #fce7f3; color: #9d174d; }
  .tag-gender-m { background: #e0f2fe; color: #075985; }
  .tag-gender-f { background: #fce7f3; color: #9d174d; }

  .card-missions { margin-top: 8px; border-top: 1px solid var(--border); padding-top: 8px; }
  .mission-row {
    display: flex; gap: 6px; align-items: flex-start;
    font-size: 0.74rem; margin-bottom: 3px;
  }
  .mission-label { color: var(--text-muted); flex-shrink: 0; min-width: 72px; }
  .mission-val { color: var(--text); font-weight: 500; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 100; align-items: center; justify-content: center; padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: 16px; max-width: 440px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header {
    padding: 20px 20px 16px;
    display: flex; align-items: center; gap: 14px;
  }
  .modal-avatar {
    width: 60px; height: 60px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; font-weight: 700; color: white; flex-shrink: 0;
    overflow: hidden; background: #94a3b8;
  }
  .modal-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .modal-name { font-size: 1.4rem; font-weight: 800; }
  .modal-sub { font-size: 0.82rem; color: var(--text-muted); margin-top: 2px; }
  .modal-body { padding: 0 20px 20px; }
  .modal-section { margin-bottom: 14px; }
  .modal-section-title {
    font-size: 0.72rem; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
  }
  .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .modal-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.875rem;
  }
  .modal-row:last-child { border-bottom: none; }
  .modal-row .key { color: var(--text-muted); }
  .modal-row .val { font-weight: 600; text-align: right; }
  .modal-close {
    display: block; width: calc(100% - 40px); margin: 0 20px 20px;
    padding: 11px; background: var(--primary); color: white;
    border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .modal-close:hover { background: var(--primary-light); }

  .no-results {
    text-align: center; padding: 48px 16px; color: var(--text-muted);
    font-size: 0.9rem;
  }
  .no-results .emoji { font-size: 2.5rem; display: block; margin-bottom: 10px; }

  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; }
    header h1 { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="flag">🇱🇰</div>
  <h1>2025 제53기 스리랑카 단기선교</h1>
  <p>팀원 정보 조회 시스템</p>
  <div class="stats-bar">
    <span>전체 <b id="totalCount">44</b>명</span>
    <span>A팀 <b>23</b>명</span>
    <span>B팀 <b>21</b>명</span>
  </div>
</header>

<div class="controls">
  <div class="search-box">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="이름으로 검색..." autocomplete="off">
  </div>

  <div class="filter-row">
    <div class="filter-group">
      <span class="filter-label">사역팀</span>
      <button class="filter-btn active" data-filter="team" data-value="">전체</button>
      <button class="filter-btn" data-filter="team" data-value="난타">난타</button>
      <button class="filter-btn" data-filter="team" data-value="무언극">무언극</button>
      <button class="filter-btn" data-filter="team" data-value="워십팀">워십팀</button>
      <button class="filter-btn" data-filter="team" data-value="인형극">인형극</button>
      <button class="filter-btn" data-filter="team" data-value="태권무">태권무</button>
    </div>
  </div>

  <div class="filter-row">
    <div class="filter-group">
      <span class="filter-label">교제조</span>
      <button class="filter-btn active" data-filter="group" data-value="">전체</button>
      <button class="filter-btn" data-filter="group" data-value="1조">1조</button>
      <button class="filter-btn" data-filter="group" data-value="2조">2조</button>
      <button class="filter-btn" data-filter="group" data-value="3조">3조</button>
      <button class="filter-btn" data-filter="group" data-value="4조">4조</button>
      <button class="filter-btn" data-filter="group" data-value="5조">5조</button>
      <button class="filter-btn" data-filter="group" data-value="6조">6조</button>
      <button class="filter-btn" data-filter="group" data-value="7조">7조</button>
    </div>
  </div>

  <div class="filter-row">
    <div class="filter-group">
      <span class="filter-label">A/B팀</span>
      <button class="filter-btn active" data-filter="ab" data-value="">전체</button>
      <button class="filter-btn" data-filter="ab" data-value="A팀">A팀</button>
      <button class="filter-btn" data-filter="ab" data-value="B팀">B팀</button>
    </div>
    <div class="filter-group">
      <span class="filter-label">버스</span>
      <button class="filter-btn active" data-filter="bus" data-value="">전체</button>
      <button class="filter-btn" data-filter="bus" data-value="1호차">1호차</button>
      <button class="filter-btn" data-filter="bus" data-value="2호차">2호차</button>
      <button class="filter-btn" data-filter="bus" data-value="3호차">3호차</button>
    </div>
    <div class="filter-group">
      <span class="filter-label">성별</span>
      <button class="filter-btn active" data-filter="gender" data-value="">전체</button>
      <button class="filter-btn" data-filter="gender" data-value="남">남</button>
      <button class="filter-btn" data-filter="gender" data-value="여">여</button>
    </div>
  </div>
</div>

<div class="result-info" id="resultInfo"></div>
<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-avatar" id="modalAvatar"></div>
      <div>
        <div class="modal-name" id="modalName"></div>
        <div class="modal-sub" id="modalSub"></div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <div class="modal-section-title">기본 정보</div>
        <div id="modalTags" class="modal-tags"></div>
      </div>
      <div class="modal-section" id="modalMissions"></div>
    </div>
    <button class="modal-close" onclick="closeModalBtn()">닫기</button>
  </div>
</div>

<script>
const TEAM_COLORS = {
  '난타': '#d97706', '무언극': '#7c3aed', '워십팀': '#0891b2',
  '인형극': '#059669', '태권무': '#dc2626'
};
const TEAM_EMOJI = {
  '난타': '🥁', '무언극': '🎭', '워십팀': '🎵', '인형극': '🧸', '태권무': '🥋'
};

let data = [];
let filters = { team: '', group: '', ab: '', bus: '', gender: '' };
let search = '';

async function loadData() {
  const res = await fetch('data.json');
  data = await res.json();
  render();
}

function getInitial(name) {
  return name ? name[0] : '?';
}

function makeCard(p) {
  const color = TEAM_COLORS[p.team] || '#1a56a0';
  const emoji = TEAM_EMOJI[p.team] || '👤';
  const missions = [];
  if (p.talawakele) missions.push({ label: '탈라와켈레', val: p.talawakele });
  if (p.sound) missions.push({ label: '음향기기', val: p.sound });
  if (p.mountzion) missions.push({ label: '마운트진학교', val: p.mountzion });
  if (p.lanka) missions.push({ label: '랑카한글학교', val: p.lanka });
  if (p.hatton) missions.push({ label: '햇톤/킬라포네', val: p.hatton });

  const missionHtml = missions.length > 0
    ? `<div class="card-missions">${missions.map(m =>
        `<div class="mission-row"><span class="mission-label">${m.label}</span><span class="mission-val">${m.val}</span></div>`
      ).join('')}</div>`
    : '';

  const avatarHtml = p.photo
    ? `<img src="images/${p.photo}" alt="${p.name}" onerror="this.parentElement.textContent='${getInitial(p.name)}'">`
    : getInitial(p.name);

  return `
    <div class="card" onclick='showModal(${JSON.stringify(p).replace(/'/g, "&#39;")})'>
      <div class="card-top">
        <div class="avatar" style="background:${color}">${avatarHtml}</div>
        <div>
          <div class="card-name">${p.name}</div>
          <div class="card-sub">${emoji} ${p.team} · ${p.group}</div>
        </div>
      </div>
      <div class="card-tags">
        <span class="tag tag-ab-${p.ab === 'A팀' ? 'a' : 'b'}">${p.ab}</span>
        <span class="tag tag-bus">🚌 ${p.bus}</span>
        <span class="tag tag-gender-${p.gender === '남' ? 'm' : 'f'}">${p.gender}</span>
      </div>
      ${missionHtml}
    </div>`;
}

function render() {
  const q = search.toLowerCase();
  const filtered = data.filter(p => {
    if (q && !p.name.includes(q)) return false;
    if (filters.team && p.team !== filters.team) return false;
    if (filters.group && p.group !== filters.group) return false;
    if (filters.ab && p.ab !== filters.ab) return false;
    if (filters.bus && p.bus !== filters.bus) return false;
    if (filters.gender && p.gender !== filters.gender) return false;
    return true;
  });

  const grid = document.getElementById('grid');
  const info = document.getElementById('resultInfo');

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results" style="grid-column:1/-1"><span class="emoji">🔍</span>검색 결과가 없습니다.</div>';
  } else {
    grid.innerHTML = filtered.map(makeCard).join('');
  }

  info.textContent = filters.team || filters.group || filters.ab || filters.bus || filters.gender || q
    ? `${filtered.length}명 표시 중 (전체 ${data.length}명)`
    : `전체 ${data.length}명`;
}

document.getElementById('searchInput').addEventListener('input', e => {
  search = e.target.value.trim();
  render();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.filter;
    const v = btn.dataset.value;
    filters[f] = v;
    document.querySelectorAll(`.filter-btn[data-filter="${f}"]`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

function showModal(p) {
  const color = TEAM_COLORS[p.team] || '#1a56a0';
  const emoji = TEAM_EMOJI[p.team] || '👤';

  const modalAvatarEl = document.getElementById('modalAvatar');
  modalAvatarEl.style.background = color;
  if (p.photo) {
    modalAvatarEl.innerHTML = `<img src="images/${p.photo}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.textContent='${getInitial(p.name)}'">`;
  } else {
    modalAvatarEl.textContent = getInitial(p.name);
  }
  document.getElementById('modalName').textContent = p.name;
  document.getElementById('modalSub').textContent = `${emoji} ${p.team} · ${p.group}`;

  document.getElementById('modalTags').innerHTML = `
    <span class="tag tag-team">${emoji} ${p.team}</span>
    <span class="tag tag-group">📋 ${p.group}</span>
    <span class="tag tag-ab-${p.ab === 'A팀' ? 'a' : 'b'}">${p.ab}</span>
    <span class="tag tag-bus">🚌 ${p.bus}</span>
    <span class="tag tag-gender-${p.gender === '남' ? 'm' : 'f'}">${p.gender === '남' ? '♂ 남' : '♀ 여'}</span>
  `;

  const missions = [
    { label: '탈라와켈레교회', val: p.talawakele },
    { label: '음향기기 담당', val: p.sound },
    { label: '마운트진 학교 7/7', val: p.mountzion },
    { label: '랑카한글학교', val: p.lanka },
    { label: '햇톤/킬라포네교회', val: p.hatton },
  ].filter(m => m.val);

  const mEl = document.getElementById('modalMissions');
  if (missions.length > 0) {
    mEl.innerHTML = `
      <div class="modal-section-title">사역 담당</div>
      ${missions.map(m => `
        <div class="modal-row">
          <span class="key">${m.label}</span>
          <span class="val">${m.val}</span>
        </div>`).join('')}`;
  } else {
    mEl.innerHTML = `<div class="modal-section-title" style="color:#94a3b8">특별 사역 없음</div>`;
  }

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalBtn();
}
function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalBtn(); });

loadData();
</script>
</body>
</html>
